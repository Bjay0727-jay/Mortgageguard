name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Test & Typecheck (runs on every push/PR) ───
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit

      - name: Typecheck Web
        run: cd apps/web && npx tsc --noEmit

      - name: Test API
        run: cd apps/api && npx vitest run

      - name: Test Shared
        run: cd packages/shared && npx vitest run

  # ─── Database Migration (only on main push) ───
  migrate:
    name: Database Migration
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run schema migration
        if: env.DATABASE_URL != ''
        run: psql "$DATABASE_URL" -f scripts/db-setup.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGCONNECT_TIMEOUT: 30

  # ─── Deploy API (only on main push, after tests pass) ───
  deploy-api:
    name: Deploy API Worker
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set, skipping deploy"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - uses: pnpm/action-setup@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'

      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.check-secrets.outputs.has_secrets == 'true'

      - name: Ensure Cloudflare resources exist
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: |
          # Create queues if they don't exist (ignore "already exists" errors)
          for QUEUE in compliance-events audit-events; do
            echo "Ensuring queue: $QUEUE"
            OUTPUT=$(npx wrangler queues create "$QUEUE" --message-retention-period-secs=86400 2>&1) && echo "Created $QUEUE" || {
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "Queue $QUEUE already exists"
              else
                echo "::error::Failed to create queue $QUEUE: $OUTPUT"
                exit 1
              fi
            }
          done

          # Create R2 buckets if they don't exist (ignore "already exists" errors)
          for BUCKET in mortgageguard-documents mortgageguard-exports; do
            echo "Ensuring R2 bucket: $BUCKET"
            OUTPUT=$(npx wrangler r2 bucket create "$BUCKET" 2>&1) && echo "Created $BUCKET" || {
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "R2 bucket $BUCKET already exists"
              else
                echo "::error::Failed to create R2 bucket $BUCKET: $OUTPUT"
                exit 1
              fi
            }
          done

          # Ensure Hyperdrive config exists
          EXISTING=$(npx wrangler hyperdrive list 2>/dev/null | grep mortgageguard-db || true)
          if [ -z "$EXISTING" ]; then
            echo "Creating Hyperdrive config..."
            npx wrangler hyperdrive create mortgageguard-db \
              --connection-string="${{ secrets.DATABASE_URL }}"
          else
            echo "Hyperdrive config already exists"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: |
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET 2>/dev/null || true
          echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler secret put RESEND_API_KEY 2>/dev/null || true
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          packageManager: pnpm
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # ─── Deploy Web (only on main push, after tests pass) ───
  deploy-web:
    name: Deploy Web
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set, skipping deploy"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - uses: pnpm/action-setup@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'

      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.check-secrets.outputs.has_secrets == 'true'

      - name: Build and Deploy Web
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: cd apps/web && pnpm run deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
